# Kitty Configuration
# Matches previous wezterm setup

# Font settings
font_family      DejaVu Sans Mono for Powerline
font_size        18.0

# Color scheme - Dracula
include dracula.conf

# Window chrome
hide_window_decorations titlebar-only
window_padding_width 2

# Tab bar settings
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style round
tab_bar_min_tabs 1
tab_title_template "{index}: {title}"

# Active tab colors (Dracula purple)
active_tab_foreground   #282a36
active_tab_background   #bd93f9
active_tab_font_style   bold
inactive_tab_foreground #f8f8f2
inactive_tab_background #191a21
tab_bar_background      #191a21

# Startup session
startup_session startup.session

# macOS specific
macos_option_as_alt yes
macos_quit_when_last_window_closed yes

# Keyboard shortcuts

# CMD+number to switch kitty tabs
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# OPT+number to switch tmux windows (sends prefix C-Space then number)
map alt+1 send_text all \x00 1
map alt+2 send_text all \x00 2
map alt+3 send_text all \x00 3
map alt+4 send_text all \x00 4
map alt+5 send_text all \x00 5
map alt+6 send_text all \x00 6
map alt+7 send_text all \x00 7
map alt+8 send_text all \x00 8
map alt+9 send_text all \x00 9

# Ctrl+A for Home, Ctrl+E for End (like wezterm config)
map ctrl+a send_text all \x1b[H
map ctrl+e send_text all \x1b[F

# CMD+K to clear screen
map cmd+k send_text all clear\r

# Shift+Enter - send right arrow then enter (like wezterm)
map shift+enter send_text all \x1b[C\r

# Clickable links
mouse_map cmd+left click ungrabbed mouse_handle_click link
mouse_map shift+left click ungrabbed mouse_handle_click link

# Scrollback
scrollback_lines 10000

# Bell
enable_audio_bell no
